<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusEngine AI - Glassmorphism Studio Pro</title>
    <style>
        :root {
            --glass-bg: rgba(18, 18, 24, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-panel: rgba(255, 255, 255, 0.03);
            --accent-purple: #a855f7;
            --accent-blue: #3b82f6;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --text-main: #f4f4f5;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #09090b 60%), 
                        radial-gradient(circle at 100% 100%, #2e1065 0%, #09090b 50%);
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* Glassmorphism Global Utilities */
        .glass-blur {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
        }

        /* Top Navigation Header Bar */
        header { 
            padding: 14px 24px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }
        .logo { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.5px; background: linear-gradient(90deg, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Master Studio Main Shell Layout */
        .studio-workspace { flex: 1; display: flex; height: calc(100vh - 340px); padding: 16px; gap: 16px; }
        
        /* Media Bin & AI Controls Left Sidebar Panel */
        .control-sidebar { 
            width: 380px; 
            border-radius: 16px;
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            gap: 20px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        .panel-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700; margin-bottom: 4px;}

        .uploader-card {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.01);
        }
        .uploader-card:hover {
            border-color: var(--accent-purple);
            background: rgba(168, 85, 247, 0.05);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .media-pool { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 4px; }
        .media-row { 
            background: var(--glass-panel); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            font-size: 0.85rem; 
        }

        /* Prompt Engineering Control Center Box */
        .ai-director-box { 
            border-radius: 12px; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: rgba(139, 92, 246, 0.04);
            border: 1px solid rgba(168, 85, 247, 0.2);
        }
        textarea { 
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; 
            padding: 12px; 
            color: white; 
            font-family: inherit; 
            font-size: 0.85rem; 
            resize: none; 
            height: 75px; 
            outline: none;
            transition: border 0.2s;
        }
        textarea:focus { border-color: var(--accent-purple); box-shadow: 0 0 10px rgba(168, 85, 247, 0.2); }

        /* Central Monitor Screen Preview Display Viewport */
        .viewport-monitor { 
            flex: 1; 
            border-radius: 16px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            position: relative;
        }
        .canvas-container { 
            width: 100%; 
            max-width: 820px; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
        }
        #viewportCanvas { width: 100%; height: 100%; object-fit: contain; display: block; }
        
        /* Master Control Component Layout Styles Buttons Controls Hooks */
        .transport-bar { 
            margin-top: 20px; 
            display: flex; 
            gap: 12px; 
            align-items: center; 
            padding: 10px 24px; 
            border-radius: 30px; 
        }
        button { 
            background: linear-gradient(135deg, var(--accent-blue), #1d4ed8); 
            color: white; 
            border: none; 
            padding: 8px 18px; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 0.85rem; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4); }
        .btn-ai { background: linear-gradient(135deg, var(--accent-purple), #7c3aed); box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3); }
        .btn-ai:hover { box-shadow: 0 6px 16px rgba(168, 85, 247, 0.5); }
        .btn-secondary { background: rgba(255, 255, 255, 0.06); color: white; border: 1px solid var(--glass-border); box-shadow: none; }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.12); }
        .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .time-readout { font-family: monospace; font-size: 1.1rem; font-weight: 600; color: #34d399; letter-spacing: 0.5px; }

        /* Multi-Track Physical Timeline Controller Deck Grid System Layout Layout */
        .timeline-deck { 
            height: 260px; 
            margin: 0 16px 16px 16px; 
            border-radius: 16px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .timeline-action-bar { 
            height: 44px; 
            background: rgba(0, 0, 0, 0.2); 
            border-bottom: 1px solid var(--glass-border); 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            gap: 16px; 
        }
        .timeline-scroll-matrix { flex: 1; overflow-y: auto; overflow-x: scroll; position: relative; background: rgba(0,0,0,0.15); }
        
        .track-channel { height: 65px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); position: relative; display: flex; align-items: center; width: 4000px; padding-left: 120px; }
        .track-channel::before { 
            content: attr(data-lane-title); 
            position: absolute; 
            left: 0; top: 0; bottom: 0; width: 105px; 
            background: rgba(20, 20, 25, 0.8); 
            backdrop-filter: blur(5px);
            display: flex; 
            align-items: center; 
            padding-left: 15px;
            font-size: 0.72rem; 
            font-weight: 700; 
            color: var(--text-muted); 
            border-right: 1px solid var(--glass-border); 
            z-index: 10; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Glassmorphic Project Assembly Timeline Blocks Objects Elements */
        .clip-node { 
            position: absolute; 
            height: 48px; 
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.25), rgba(29, 78, 216, 0.25)); 
            border: 1px solid rgba(96, 165, 250, 0.4); 
            backdrop-filter: blur(5px);
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            padding: 0 12px; 
            font-size: 0.75rem; 
            font-weight: 600; 
            cursor: grab; 
            overflow: hidden; 
            white-space: nowrap; 
            text-overflow: ellipsis;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .clip-node.selected { 
            border-color: #f59e0b; 
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.4); 
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.15), rgba(217, 119, 6, 0.15));
        }
        .clip-node.ai-generated {
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.25), rgba(124, 58, 237, 0.25));
            border-color: rgba(192, 132, 252, 0.5);
        }
        .trim-edge-handle { position: absolute; right: 0; top: 0; bottom: 0; width: 8px; background: rgba(255,255,255,0.15); cursor: ew-resize; transition: background 0.2s; border-radius: 0 6px 6px 0; }
        .trim-edge-handle:hover { background: rgba(255,255,255,0.3); }

        /* Playhead Navigation Needle Element Track */
        #studioPlayhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #f43f5e; z-index: 100; pointer-events: none; left: 120px; box-shadow: 0 0 8px #f43f5e; }
        #studioPlayhead::after { content: ''; position: absolute; top: 0; left: -5px; border-width: 6px 6px 0 6px; border-style: solid; border-color: #f43f5e transparent transparent transparent; }
        
        /* Loading & Processing HUD Cover Modals UI Screens States */
        #hudProcessingOverlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(9, 9, 11, 0.85); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 2000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; 
            font-weight: 600; 
            display: none; 
        }
        .hud-spinner { width: 50px; height: 50px; border: 4px solid rgba(168, 85, 247, 0.1); border-left-color: var(--accent-purple); border-radius: 50%; animation: spinHUD 0.8s linear infinite; filter: drop-shadow(0 0 8px var(--accent-purple)); }
        @keyframes spinHUD { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="glass-blur">
        <div class="logo">NEXUS<span>ENGINE AI</span></div>
        <button id="masterExportBtn" class="btn-ai" disabled onclick="executeProjectRenderDownload()">Export Production MP4</button>
    </header>

    <div class="studio-workspace">
        
        <div class="control-sidebar glass-blur">
            <div>
                <p class="panel-title">Project Ingestion Pool</p>
                <div class="uploader-card" onclick="document.getElementById('nativeStoragePicker').click()">
                    <p style="font-size: 0.9rem; font-weight: 600;">Import Raw Assets</p>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">Drag or browse local clips</p>
                    <input type="file" id="nativeStoragePicker" accept="video/*" multiple style="display:none" onchange="ingestProjectMediaFiles(this)">
                </div>
            </div>

            <div class="media-pool" id="sidebarAssetContainer"></div>

            <div class="ai-director-box">
                <h4>🤖 Copilot Orchestrator</h4>
                <textarea id="aiPromptInput" placeholder="Enter generative direction... (e.g. 'Create a cinematic montage clip cut at 3s rhythm intervals, add a vintage sepia grading look, and embed upper thirds')"></textarea>
                <button class="btn-ai" onclick="dispatchAICompositorPrompt()">Compile AI Sequence</button>
            </div>
        </div>

        <div class="viewport-monitor glass-blur">
            <div class="canvas-container">
                <canvas id="viewportCanvas" width="1280" height="720"></canvas>
            </div>
            <div class="transport-bar glass-blur">
                <button class="btn-secondary" onclick="updateGlobalTimelineClock(0)">⏮</button>
                <button id="playbackControlBtn" onclick="toggleEnginePlaybackState()">▶ Play</button>
                <div class="time-readout" id="clockReadout">00:00.00</div>
            </div>
        </div>
    </div>

    <div class="timeline-deck glass-blur">
        <div class="timeline-action-bar">
            <button id="splitToolBtn" class="btn-secondary" disabled onclick="executeClipSplitAtPlayhead()">✂ Split Element</button>
            <p style="font-size: 0.75rem; color: var(--text-muted);">Grid Matrix Alignment Calibration: 1 Second = 20 Pixels Sizing Horizontal Scale Mapping Steps</p>
        </div>
        <div class="timeline-scroll-matrix" id="scrollWorkspaceTrackWrapper" onclick="interceptTimelineNavigationClicks(event)">
            <div id="studioPlayhead"></div>
            
            <div class="track-channel" data-lane-title="Video Core V1" id="laneV1Container"></div>
            
            <div class="track-channel" data-lane-title="FX Overlays T1" id="laneFXContainer"></div>
        </div>
    </div>

    <div id="hudProcessingOverlay">
        <div class="hud-spinner"></div>
        <div id="hudProcessingStatusString" style="letter-spacing: 0.5px; font-size: 0.95rem;">Nexus Engine Processing Matrix Channels...</div>
    </div>

    <script type="module">
        // Global High-Performance Application Core Matrix Properties Configurations
        let ingestedAssetsDb = {};
        let activeTimelineClips = [];
        let programmaticFXLayers = [];
        let activeSelectedClipId = null;
        let globalPlaybackClockSeconds = 0;
        let isEngineActivelyPlaying = false;
        let animationFrameLoopRef = null;

        const horizontalScaleFactorPixelsPerSecond = 20; 
        const laneXAxisStartPadOffset = 120; // Matches physical structural offset constraints rules CSS metrics dimensions bounds

        const canvasViewport = document.getElementById('viewportCanvas');
        const ctx = canvasViewport.getContext('2d');
        const playheadNeedle = document.getElementById('studioPlayhead');
        const clockStringReadout = document.getElementById('clockReadout');

        // Flush out canvas viewport container bounds properties geometries
        clearCanvasViewportMonitor();

        function clearCanvasViewportMonitor() {
            ctx.fillStyle = '#020202';
            ctx.fillRect(0, 0, canvasViewport.width, canvasViewport.height);
        }

        // Project Media File Ingestion Array Loader Handlers Matrix Controllers
        window.ingestProjectMediaFiles = function(element) {
            const rawFileList = Array.from(element.files);
            const panelContainer = document.getElementById('sidebarAssetContainer');
            
            rawFileList.forEach(file => {
                const uniqueUuid = 'asset_node_' + Math.random().toString(36).substr(2, 9);
                const internalBlobUrlReference = URL.createObjectURL(file);
                
                const hiddenVideoDecoderInstanceNode = document.createElement('video');
                hiddenVideoDecoderInstanceNode.src = internalBlobUrlReference;
                hiddenVideoDecoderInstanceNode.muted = true;
                hiddenVideoDecoderInstanceNode.playsInline = true;

                hiddenVideoDecoderInstanceNode.onloadeddata = () => {
                    ingestedAssetsDb[uniqueUuid] = {
                        uuid: uniqueUuid,
                        filename: file.name,
                        binaryPointer: file,
                        domNode: hiddenVideoDecoderInstanceNode,
                        durationSeconds: hiddenVideoDecoderInstanceNode.duration
                    };
                    refreshAssetBinSidebarUi();
                };
            });
        };

        function refreshAssetBinSidebarUi() {
            const container = document.getElementById('sidebarAssetContainer');
            container.innerHTML = '';
            
            Object.values(ingestedAssetsDb).forEach(asset => {
                const elementRow = document.createElement('div');
                elementRow.className = 'media-row';
                elementRow.innerHTML = `
                    <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px; font-weight:500;">📹 ${asset.filename}</span>
                    <button onclick="appendAssetItemToTimelineLanes('${asset.uuid}')" style="padding: 4px 10px; font-size:0.75rem;">+ Append</button>
                `;
                container.appendChild(elementRow);
            });
        }

        // Non-Linear Append Operations Method Configurations Blocks Elements Models
        window.appendAssetItemToTimelineLanes = function(assetUuid) {
            const assetReference = ingestedAssetsDb[assetUuid];
            const dynamicClipId = 'clip_layer_' + Math.random().toString(36).substr(2, 9);

            // Structure a precise edit tracking element module blueprint setup mapping context parameters bounds properties configurations models
            const compiledClipObjectParameters = {
                id: dynamicClipId,
                assetUuid: assetUuid,
                targetLaneChannelId: 'laneV1Container',
                timelineStartAnchorSeconds: 0,
                internalSourceTrimOffsetSeconds: 0,
                activeDurationSeconds: assetReference.durationSeconds
            };

            activeTimelineClips.push(compiledClipObjectParameters);
            refreshTimelineTracksSystemUiDecks();
            triggerCompositorViewportRenderLoop();
        };

        function refreshTimelineTracksSystemUiDecks() {
            document.getElementById('laneV1Container').querySelectorAll('.clip-node').forEach(el => el.remove());
            document.getElementById('laneFXContainer').querySelectorAll('.clip-node').forEach(el => el.remove());

            // Build out Primary Video Lane Clip Blocks
            activeTimelineClips.forEach(clip => {
                const assetData = ingestedAssetsDb[clip.assetUuid];
                const node = document.createElement('div');
                node.className = `clip-node ${activeSelectedClipId === clip.id ? 'selected' : ''}`;
                node.id = clip.id;
                node.style.left = `${laneXAxisStartPadOffset + (clip.timelineStartAnchorSeconds * horizontalScaleFactorPixelsPerSecond)}px`;
                node.style.width = `${clip.activeDurationSeconds * horizontalScaleFactorPixelsPerSecond}px`;
                node.innerText = assetData.filename;

                const trimHandle = document.createElement('div');
                trimHandle.className = 'trim-edge-handle';
                node.appendChild(trimHandle);

                // Inject mouse interaction engines directly into nodes handles context profiles parameters properties bounds configurations
                bindTimelineClipNodesMouseGestures(node, clip, trimHandle);

                document.getElementById(clip.targetLaneChannelId).appendChild(node);
            });

            // Build out Programmatic FX Bars Overlays Channels Structural Components
